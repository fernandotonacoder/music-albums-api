# ============================================================================
# Music Albums API - Azure DevOps Pipeline
# ============================================================================
#
# PREREQUISITES (Azure DevOps project setup):
#   1. Service Connection: azure-service-connection
#   2. Variable groups:
#      - music-albums-dev
#      - music-albums-prod
#   3. Each group should define:
#      - RESOURCE_GROUP, LOCATION, BASE_NAME, aspNetCoreEnvironment
#      - pg-admin-login, pg-admin-password, jwt-key, api-key (mark as secrets)
#
# PIPELINE RUNTIME:
#   - Choose parameter: targetEnvironment (dev | prod)
#   - Choose parameter: deployInfra (default false)
#   - Pipeline loads matching variable group automatically
#
# ============================================================================

parameters:
  - name: deployInfra
    displayName: Deploy infrastructure (Bicep)
    type: boolean
    default: false
  - name: targetEnvironment
    displayName: Target environment
    type: string
    default: dev
    values:
      - dev
      - prod

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - Dockerfile
      - infra/main/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - Dockerfile
      - infra/**

pool:
  vmImage: ubuntu-latest

variables:
  - name: imageRepository
    value: fernandotonacoder/music-albums-api
  - name: containerRegistry
    value: github-ghcr
  - name: dockerfilePath
    value: "$(Build.SourcesDirectory)/Dockerfile"
  - name: tag
    value: "$(Build.BuildId)"
  - name: location
    value: "westeurope"
  - name: baseName
    value: "music-albums"
  - name: aspNetCoreEnvironment
    value: "Development"
  - ${{ if eq(parameters.targetEnvironment, 'dev') }}:
      - group: music-albums-dev
      - name: deploymentEnvironmentName
        value: Development
  - ${{ if eq(parameters.targetEnvironment, 'prod') }}:
      - group: music-albums-prod
      - name: deploymentEnvironmentName
        value: Production
  - name: containerAppName
    value: "$(baseName)-api-${{ parameters.targetEnvironment }}"

stages:
  # ============================================================================
  # Build Stage
  # ============================================================================
  - stage: Build
    displayName: Build and Push
    jobs:
      - job: Build
        displayName: Build Docker Image
        variables:
          DOCKER_BUILDKIT: 1
        steps:
          - task: Docker@2
            displayName: Build Docker image
            inputs:
              containerRegistry: $(containerRegistry)
              repository: "$(imageRepository)"
              command: build
              Dockerfile: "$(dockerfilePath)"
              arguments: '--label "org.opencontainers.image.source=https://github.com/fernandotonacoder/music-albums-api"'
              tags: |
                $(tag)
                $(tag)-${{ parameters.targetEnvironment }}
                ${{ parameters.targetEnvironment }}

          - task: Docker@2
            displayName: Push to GitHub Container Registry
            inputs:
              containerRegistry: $(containerRegistry)
              repository: "$(imageRepository)"
              command: push
              tags: |
                $(tag)
                $(tag)-${{ parameters.targetEnvironment }}
                ${{ parameters.targetEnvironment }}

      - job: LintBicep
        displayName: Lint Bicep Templates
        steps:
          - task: AzureCLI@2
            displayName: Lint Bicep templates
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az bicep upgrade
                az bicep version

                echo "Linting infra/main/main.bicep..."
                az bicep build --file infra/main/main.bicep
                echo "✓ main.bicep is valid"

                echo "Linting Bicep modules..."
                for module in infra/main/modules/*.bicep; do
                  echo "  Linting $module"
                  az bicep build --file "$module"
                done
                echo "✓ All modules are valid"

  # # ============================================================================
  # # Test Stage
  # # ============================================================================
  # - stage: Test
  #   displayName: 'Run Tests'
  #   dependsOn: Build
  #   jobs:
  #     - job: UnitTests
  #       displayName: 'Unit Tests'
  #       steps:
  #         - task: UseDotNet@2
  #           displayName: 'Use .NET SDK'
  #           inputs:
  #             packageType: 'sdk'
  #             version: '8.x'

  #         - task: DotNetCoreCLI@2
  #           displayName: 'Restore packages'
  #           inputs:
  #             command: 'restore'
  #             projects: '**/*.csproj'

  #         - task: DotNetCoreCLI@2
  #           displayName: 'Run unit tests'
  #           inputs:
  #             command: 'test'
  #             projects: '**/tests/**/*.csproj'
  #             arguments: '--configuration Release --no-restore'

  # ============================================================================
  # Preview Infrastructure Stage (What-If Analysis)
  # ============================================================================
  - stage: PreviewInfra
    displayName: Preview Infrastructure Changes
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.deployInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - job: WhatIf
        displayName: Run What-If Analysis
        steps:
          - task: AzureCLI@2
            displayName: Ensure resource group exists
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az group create \
                  --name '$(RESOURCE_GROUP)' \
                  --location '$(location)'

          - task: AzureCLI@2
            displayName: Run What-If analysis
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "========================================"
                echo "Running What-If Analysis"
                echo "Environment: ${{ parameters.targetEnvironment }}"
                echo "Resource Group: $(RESOURCE_GROUP)"
                echo "========================================"
                echo ""

                az deployment group what-if \
                  --resource-group '$(RESOURCE_GROUP)' \
                  --template-file infra/main/main.bicep \
                  --parameters \
                    location='$(location)' \
                    baseName='$(baseName)' \
                    deploymentSuffix='${{ parameters.targetEnvironment }}' \
                    aspNetCoreEnvironment='$(aspNetCoreEnvironment)' \
                    postgresAdminLogin='$(pg-admin-login)' \
                    postgresAdminPassword='$(pg-admin-password)' \
                    jwtKey='$(jwt-key)' \
                    apiKey='$(api-key)' \
                    imageTag='$(tag)' \
                  --result-format ResourceIdOnly

                echo ""
                echo "========================================"
                echo "What-If Analysis Complete"
                echo "Review the changes above before deployment"
                echo "========================================"

  # ============================================================================
  # Deploy Infrastructure Stage (optional - run manually or on infra changes)
  # ============================================================================
  - stage: DeployInfra
    displayName: Deploy Infrastructure
    dependsOn: PreviewInfra
    condition: and(succeeded(), eq('${{ parameters.deployInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - deployment: DeployBicep
        displayName: Deploy Bicep Template
        environment: $(deploymentEnvironmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Ensure resource group exists
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az group create \
                        --name '$(RESOURCE_GROUP)' \
                        --location '$(location)'

                - task: AzureCLI@2
                  displayName: Deploy infrastructure
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --template-file infra/main/main.bicep \
                        --parameters \
                          location='$(location)' \
                          baseName='$(baseName)' \
                          deploymentSuffix='${{ parameters.targetEnvironment }}' \
                          aspNetCoreEnvironment='$(aspNetCoreEnvironment)' \
                          postgresAdminLogin='$(pg-admin-login)' \
                          postgresAdminPassword='$(pg-admin-password)' \
                          jwtKey='$(jwt-key)' \
                          apiKey='$(api-key)' \
                          imageTag='$(tag)'

  # ============================================================================
  # Deploy Application Stage
  # ============================================================================
  - stage: DeployApp
    displayName: Deploy Application
    dependsOn:
      - Build
      - PreviewInfra
      - DeployInfra
    condition: |
      and(
        eq(dependencies.Build.result, 'Succeeded'),
        in(dependencies.PreviewInfra.result, 'Succeeded', 'Skipped'),
        in(dependencies.DeployInfra.result, 'Succeeded', 'Skipped'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - deployment: DeployToAzure
        displayName: Deploy to Container Apps
        environment: $(deploymentEnvironmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Update Container App
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name '$(containerAppName)' \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --image 'ghcr.io/$(imageRepository):$(tag)'

                - task: AzureCLI@2
                  displayName: Verify deployment
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # FIX: Replaced brittle sleep 30 with a retry loop.
                      # Retries up to 10 times with 15s gaps (2.5 min total
                      # window) before failing the pipeline.
                      APP_URL=$(az containerapp show \
                        --name '$(containerAppName)' \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --query 'properties.configuration.ingress.fqdn' -o tsv)

                      echo "Checking health at https://$APP_URL/_health"

                      for i in {1..10}; do
                        if curl -sf "https://$APP_URL/_health"; then
                          echo "Deployment successful!"
                          exit 0
                        fi
                        echo "Attempt $i/10 failed, retrying in 15s..."
                        sleep 15
                      done

                      echo "Health check failed after all retries."
                      exit 1
