# ============================================================================
# Music Albums API - Azure DevOps Pipeline
# ============================================================================
#
# PREREQUISITES (Azure DevOps project setup):
#   1. Service Connections:
#      - azure-service-connection        (dev — Azure for Students)
#      - azure-service-connection-prod   (prod — VS Professional)
#   2. Variable groups:
#      - music-albums-dev
#      - music-albums-prod
#   3. Each group should define:
#      - RESOURCE_GROUP, LOCATION, BASE_NAME, aspNetCoreEnvironment
#      - pg-admin-login, pg-admin-password, jwt-key, api-key (mark as secrets)
#
# PIPELINE RUNTIME:
#   - Choose parameter: targetEnvironment (dev | prod)
#   - Choose parameter: deployInfra (default false)
#   - Pipeline loads matching variable group automatically
#
# ============================================================================

parameters:
  - name: deployInfra
    displayName: Deploy infrastructure (Bicep)
    type: boolean
    default: false
  - name: targetEnvironment
    displayName: Target environment
    type: string
    default: dev
    values:
      - dev
      - prod

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - Dockerfile
      - infra/main/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - Dockerfile
      - infra/**

pool:
  vmImage: ubuntu-latest

variables:
  - name: imageRepository
    value: fernandotonacoder/music-albums-api
  - name: containerRegistry
    value: github-ghcr
  - name: dockerfilePath
    value: "$(Build.SourcesDirectory)/Dockerfile"
  - name: tag
    value: "$(Build.BuildId)"
  - name: LOCATION
    value: "westeurope"
  - name: BASE_NAME
    value: "music-albums"
  - name: aspNetCoreEnvironment
    value: "Development"
  - ${{ if eq(parameters.targetEnvironment, 'dev') }}:
      - group: music-albums-dev
      - name: deploymentEnvironmentName
        value: Development
      - name: azureServiceConnection
        value: azure-service-connection
  - ${{ if eq(parameters.targetEnvironment, 'prod') }}:
      - group: music-albums-prod
      - name: deploymentEnvironmentName
        value: Production
      - name: azureServiceConnection
        value: azure-service-connection-prod
  - name: containerAppName
    value: "$(BASE_NAME)-api-${{ parameters.targetEnvironment }}"

stages:
  # ============================================================================
  # Build Stage
  # ============================================================================
  - stage: Build
    displayName: Build and Push
    jobs:
      - job: Build
        displayName: Build Docker Image
        variables:
          DOCKER_BUILDKIT: 1
        steps:
          - task: Docker@2
            displayName: Build Docker image
            inputs:
              containerRegistry: $(containerRegistry)
              repository: "$(imageRepository)"
              command: build
              Dockerfile: "$(dockerfilePath)"
              arguments: '--label "org.opencontainers.image.source=https://github.com/fernandotonacoder/music-albums-api"'
              tags: |
                $(tag)
                $(tag)-${{ parameters.targetEnvironment }}
                ${{ parameters.targetEnvironment }}

          - task: Docker@2
            displayName: Push to GitHub Container Registry
            inputs:
              containerRegistry: $(containerRegistry)
              repository: "$(imageRepository)"
              command: push
              tags: |
                $(tag)
                $(tag)-${{ parameters.targetEnvironment }}
                ${{ parameters.targetEnvironment }}

      - job: LintBicep
        displayName: Lint Bicep Templates
        steps:
          - task: AzureCLI@2
            displayName: Lint Bicep templates
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az bicep upgrade
                az bicep version

                echo "Linting infra/main/main.bicep..."
                az bicep build --file infra/main/main.bicep
                echo "✓ main.bicep is valid"

                echo "Linting Bicep modules..."
                for module in infra/main/modules/*.bicep; do
                  echo "  Linting $module"
                  az bicep build --file "$module"
                done
                echo "✓ All modules are valid"

  # # ============================================================================
  # # Test Stage
  # # ============================================================================
  # - stage: Test
  #   displayName: 'Run Tests'
  #   dependsOn: Build
  #   jobs:
  #     - job: UnitTests
  #       displayName: 'Unit Tests'
  #       steps:
  #         - task: UseDotNet@2
  #           displayName: 'Use .NET SDK'
  #           inputs:
  #             packageType: 'sdk'
  #             version: '8.x'

  #         - task: DotNetCoreCLI@2
  #           displayName: 'Restore packages'
  #           inputs:
  #             command: 'restore'
  #             projects: '**/*.csproj'

  #         - task: DotNetCoreCLI@2
  #           displayName: 'Run unit tests'
  #           inputs:
  #             command: 'test'
  #             projects: '**/tests/**/*.csproj'
  #             arguments: '--configuration Release --no-restore'

  # ============================================================================
  # Preview Infrastructure Stage (What-If Analysis)
  # ============================================================================
  - stage: PreviewInfra
    displayName: Preview Infrastructure Changes
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.deployInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - job: WhatIf
        displayName: Run What-If Analysis
        steps:
          - task: AzureCLI@2
            displayName: Ensure resource group exists
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                if [ "$(az group exists --name '$(RESOURCE_GROUP)')" = "true" ]; then
                  echo "Resource group $(RESOURCE_GROUP) already exists. Skipping creation."
                else
                  az group create \
                    --name '$(RESOURCE_GROUP)' \
                    --location '$(LOCATION)'
                fi

                # Validate RG is accessible in current subscription context.
                az group show --name '$(RESOURCE_GROUP)' --query name -o tsv > /dev/null
                echo "Resource group $(RESOURCE_GROUP) is ready."

          - task: AzureCLI@2
            displayName: Run What-If analysis
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "========================================"
                echo "Running What-If Analysis"
                echo "Environment: ${{ parameters.targetEnvironment }}"
                echo "Resource Group: $(RESOURCE_GROUP)"
                echo "========================================"
                echo ""

                az deployment group what-if \
                  --resource-group '$(RESOURCE_GROUP)' \
                  --template-file infra/main/main.bicep \
                  --parameters \
                    location='$(LOCATION)' \
                    baseName='$(BASE_NAME)' \
                    deploymentSuffix='${{ parameters.targetEnvironment }}' \
                    aspNetCoreEnvironment='$(aspNetCoreEnvironment)' \
                    postgresAdminLogin='$(pg-admin-login)' \
                    postgresAdminPassword='$(pg-admin-password)' \
                    jwtKey='$(jwt-key)' \
                    apiKey='$(api-key)' \
                    imageTag='$(tag)' \
                  --result-format ResourceIdOnly

                echo ""
                echo "========================================"
                echo "What-If Analysis Complete"
                echo "Review the changes above before deployment"
                echo "========================================"

  # ============================================================================
  # Deploy Infrastructure Stage (optional - run manually or on infra changes)
  # ============================================================================
  - stage: DeployInfra
    displayName: Deploy Infrastructure
    dependsOn: PreviewInfra
    condition: and(succeeded(), eq('${{ parameters.deployInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - deployment: DeployBicep
        displayName: Deploy Bicep Template
        environment: $(deploymentEnvironmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Ensure resource group exists
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      if [ "$(az group exists --name '$(RESOURCE_GROUP)')" = "true" ]; then
                        echo "Resource group $(RESOURCE_GROUP) already exists. Skipping creation."
                      else
                        az group create \
                          --name '$(RESOURCE_GROUP)' \
                          --location '$(LOCATION)'
                      fi

                      # Validate RG is accessible in current subscription context.
                      az group show --name '$(RESOURCE_GROUP)' --query name -o tsv > /dev/null
                      echo "Resource group $(RESOURCE_GROUP) is ready."

                - task: AzureCLI@2
                  displayName: Deploy infrastructure
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set +e
                      az deployment group create \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --name main \
                        --template-file infra/main/main.bicep \
                        --parameters \
                          location='$(LOCATION)' \
                          baseName='$(BASE_NAME)' \
                          deploymentSuffix='${{ parameters.targetEnvironment }}' \
                          aspNetCoreEnvironment='$(aspNetCoreEnvironment)' \
                          postgresAdminLogin='$(pg-admin-login)' \
                          postgresAdminPassword='$(pg-admin-password)' \
                          jwtKey='$(jwt-key)' \
                          apiKey='$(api-key)' \
                          imageTag='$(tag)'
                      DEPLOY_EXIT_CODE=$?
                      set -e

                      if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
                        echo "Deployment failed. Fetching deployment operations for diagnostics..."
                        echo "--- Deployment root error (properties.error) ---"
                        az deployment group show \
                          --resource-group '$(RESOURCE_GROUP)' \
                          --name main \
                          --query 'properties.error' \
                          -o jsonc || true

                        echo "--- Failed deployment operations (full statusMessage) ---"
                        az deployment operation group list \
                          --resource-group '$(RESOURCE_GROUP)' \
                          --name main \
                          --query "[?properties.provisioningState=='Failed'].{operationId:operationId,targetType:properties.targetResource.resourceType,targetName:properties.targetResource.resourceName,error:properties.statusMessage}" \
                          -o jsonc || true

                        exit $DEPLOY_EXIT_CODE
                      fi

  # ============================================================================
  # Deploy Application Stage
  # ============================================================================
  - stage: DeployApp
    displayName: Deploy Application
    dependsOn:
      - Build
      - PreviewInfra
      - DeployInfra
    condition: |
      and(
        eq(dependencies.Build.result, 'Succeeded'),
        in(dependencies.PreviewInfra.result, 'Succeeded', 'Skipped'),
        in(dependencies.DeployInfra.result, 'Succeeded', 'Skipped'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - deployment: DeployToAzure
        displayName: Deploy to Container Apps
        environment: $(deploymentEnvironmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - bash: |
                    DEPLOY_ID=$(curl -sf -X POST \
                      -H "Authorization: token $(GITHUB_TOKEN)" \
                      -H "Accept: application/vnd.github.v3+json" \
                      https://api.github.com/repos/fernandotonacoder/music-albums-api/deployments \
                      -d '{"ref":"'$(Build.SourceVersion)'","environment":"${{ parameters.targetEnvironment }}","auto_merge":false,"required_contexts":[],"description":"Music Albums API ${{ parameters.targetEnvironment }}"}' \
                      | jq -r '.id')
                    echo "##vso[task.setvariable variable=ghDeploymentId]$DEPLOY_ID"
                    echo "Created GitHub Deployment: $DEPLOY_ID"
                  displayName: Create GitHub Deployment

                - task: AzureCLI@2
                  displayName: Update Container App
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name '$(containerAppName)' \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --image 'ghcr.io/$(imageRepository):$(tag)'

                - task: AzureCLI@2
                  displayName: Verify deployment
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      # FIX: Replaced brittle sleep 30 with a retry loop.
                      # Retries up to 10 times with 15s gaps (2.5 min total
                      # window) before failing the pipeline.
                      APP_URL=$(az containerapp show \
                        --name '$(containerAppName)' \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --query 'properties.configuration.ingress.fqdn' -o tsv)

                      echo "Checking health at https://$APP_URL/_health"
                      echo "##vso[task.setvariable variable=appFqdn]$APP_URL"

                      for i in {1..10}; do
                        if curl -sf "https://$APP_URL/_health"; then
                          echo "Deployment successful!"
                          exit 0
                        fi
                        echo "Attempt $i/10 failed, retrying in 15s..."
                        sleep 15
                      done

                      echo "Health check failed after all retries."
                      exit 1

                - bash: |
                    if [ -z "$(ghDeploymentId)" ]; then
                      echo "No GitHub Deployment ID found. Skipping status update."
                      exit 0
                    fi

                    if [ "$(Agent.JobStatus)" = "Succeeded" ]; then
                      STATUS="success"
                    else
                      STATUS="failure"
                    fi

                    ENV_URL="https://$(appFqdn)"
                    LOG_URL="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"

                    curl -sf -X POST \
                      -H "Authorization: token $(GITHUB_TOKEN)" \
                      -H "Accept: application/vnd.github.v3+json" \
                      https://api.github.com/repos/fernandotonacoder/music-albums-api/deployments/$(ghDeploymentId)/statuses \
                      -d '{"state":"'"$STATUS"'","environment_url":"'"$ENV_URL"'","log_url":"'"$LOG_URL"'","auto_inactive":true}'
                    echo "GitHub Deployment status updated to $STATUS"
                  displayName: Update GitHub Deployment status
                  condition: always()
