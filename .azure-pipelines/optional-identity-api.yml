# ============================================================================
# Identity API - Azure DevOps Pipeline
# ============================================================================
# Builds on push to main (when Identity API files change).
# Deploy/destroy infrastructure is manual only.
#
# Use this to generate JWT tokens when testing remotely.
# Remember to destroy resources when done to save costs!
# ============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/optional-identity-api-helper-tool/**
      - tools/Identity.Api/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/optional-identity-api-helper-tool/**
      - tools/Identity.Api/**

parameters:
  - name: deployInfra
    displayName: Deploy infrastructure (Bicep)
    type: boolean
    default: false
  - name: destroyInfra
    displayName: Destroy infrastructure (cleanup)
    type: boolean
    default: false
  - name: environment
    displayName: "Environment"
    type: string
    values:
      - dev
      - prod
    default: dev

variables:
  - ${{ if eq(parameters.environment, 'dev') }}:
      - group: music-albums-dev
      - name: deploymentEnvironmentName
        value: Development
      - name: azureServiceConnection
        value: azure-service-connection
  - ${{ if eq(parameters.environment, 'prod') }}:
      - group: music-albums-prod
      - name: deploymentEnvironmentName
        value: Production
      - name: azureServiceConnection
        value: azure-service-connection-prod
  - name: imageTag
    value: "$(Build.BuildId)"
  - name: containerImage
    value: "ghcr.io/fernandotonacoder/identity-api:$(imageTag)"
  - name: containerAppName
    value: "id-api-$(BASE_NAME)-${{ parameters.environment }}"

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build Docker Image
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Build Docker image
            inputs:
              containerRegistry: github-ghcr
              repository: fernandotonacoder/identity-api
              command: build
              dockerfile: tools/Identity.Api/Dockerfile
              tags: |
                $(imageTag)
                $(imageTag)-${{ parameters.environment }}
                ${{ parameters.environment }}

          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/docker"
              docker save \
                ghcr.io/fernandotonacoder/identity-api:$(imageTag) \
                ghcr.io/fernandotonacoder/identity-api:$(imageTag)-${{ parameters.environment }} \
                ghcr.io/fernandotonacoder/identity-api:${{ parameters.environment }} \
                -o "$(Build.ArtifactStagingDirectory)/docker/identity-api.tar"
            displayName: Export Docker image artifact

          - task: PublishPipelineArtifact@1
            displayName: Publish Docker image artifact
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/docker"
              artifact: "identity-api-image"

      - job: LintBicep
        displayName: Lint Bicep Templates
        steps:
          - task: AzureCLI@2
            displayName: Lint Bicep templates
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az bicep upgrade
                az bicep version

                echo "Linting infra/optional-identity-api-helper-tool/optional-identity-api-helper-tool.bicep..."
                az bicep build --file infra/optional-identity-api-helper-tool/optional-identity-api-helper-tool.bicep
                echo "✓ Bicep template is valid"

          - task: PublishPipelineArtifact@1
            displayName: Publish Bicep artifact
            inputs:
              targetPath: "$(Build.SourcesDirectory)/infra/optional-identity-api-helper-tool"
              artifact: "identity-api-infra"

  - stage: Push
    displayName: Push Docker Image
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: Push
        displayName: Push to GitHub Container Registry
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download Docker image artifact
            inputs:
              artifact: "identity-api-image"
              path: "$(Pipeline.Workspace)/docker"

          - bash: |
              docker load -i '$(Pipeline.Workspace)/docker/identity-api.tar'
            displayName: Load Docker image artifact

          - task: Docker@2
            displayName: Push to GitHub Container Registry
            inputs:
              containerRegistry: github-ghcr
              repository: fernandotonacoder/identity-api
              command: push
              tags: |
                $(imageTag)
                $(imageTag)-${{ parameters.environment }}
                ${{ parameters.environment }}

  - stage: PreviewInfra
    displayName: Preview Infrastructure Changes
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.deployInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - job: WhatIf
        displayName: Run What-If Analysis
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download Bicep artifact
            inputs:
              artifact: "identity-api-infra"
              path: "$(Pipeline.Workspace)/identity-api-infra"

          - task: AzureCLI@2
            displayName: Ensure resource group exists
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                if [ "$(az group exists --name '$(RESOURCE_GROUP)')" = "true" ]; then
                  echo "Resource group $(RESOURCE_GROUP) already exists. Skipping creation."
                else
                  az group create \
                    --name '$(RESOURCE_GROUP)' \
                    --location '$(LOCATION)'
                fi

                # Validate RG is accessible in current subscription context.
                az group show --name '$(RESOURCE_GROUP)' --query name -o tsv > /dev/null
                echo "Resource group $(RESOURCE_GROUP) is ready."

          - task: AzureCLI@2
            displayName: Run What-If analysis
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "========================================"
                echo "Running What-If Analysis"
                echo "Environment: ${{ parameters.environment }}"
                echo "Resource Group: $(RESOURCE_GROUP)"
                echo "========================================"
                echo ""

                az deployment group what-if \
                  --resource-group '$(RESOURCE_GROUP)' \
                  --template-file $(Pipeline.Workspace)/identity-api-infra/optional-identity-api-helper-tool.bicep \
                  --parameters \
                    location='$(LOCATION)' \
                    baseName='id-api-$(BASE_NAME)' \
                    deploymentSuffix=${{ parameters.environment }} \
                    containerImage=$(containerImage) \
                    jwtSecret='$(jwt-key)' \
                    aspNetCoreEnvironment='$(aspNetCoreEnvironment)' \
                    containerAppEnvironmentName='$(BASE_NAME)-env-${{ parameters.environment }}' \
                  --result-format ResourceIdOnly

                echo ""
                echo "========================================"
                echo "What-If Analysis Complete"
                echo "Review the changes above before deployment"
                echo "========================================"

  - stage: DeployInfra
    displayName: Deploy Infrastructure
    dependsOn: PreviewInfra
    condition: and(succeeded(), eq('${{ parameters.deployInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - deployment: DeployBicep
        displayName: Deploy Bicep Template
        environment: $(deploymentEnvironmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: Download Bicep artifact
                  inputs:
                    artifact: "identity-api-infra"
                    path: "$(Pipeline.Workspace)/identity-api-infra"

                - task: AzureCLI@2
                  displayName: Ensure resource group exists
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      if [ "$(az group exists --name '$(RESOURCE_GROUP)')" = "true" ]; then
                        echo "Resource group $(RESOURCE_GROUP) already exists. Skipping creation."
                      else
                        az group create \
                          --name '$(RESOURCE_GROUP)' \
                          --location '$(LOCATION)'
                      fi

                      # Validate RG is accessible in current subscription context.
                      az group show --name '$(RESOURCE_GROUP)' --query name -o tsv > /dev/null
                      echo "Resource group $(RESOURCE_GROUP) is ready."

                - task: AzureCLI@2
                  displayName: Deploy infrastructure
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group create \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --template-file $(Pipeline.Workspace)/identity-api-infra/optional-identity-api-helper-tool.bicep \
                        --parameters \
                          location='$(LOCATION)' \
                          baseName='id-api-$(BASE_NAME)' \
                          deploymentSuffix=${{ parameters.environment }} \
                          containerImage=$(containerImage) \
                          jwtSecret='$(jwt-key)' \
                          aspNetCoreEnvironment='$(aspNetCoreEnvironment)' \
                          containerAppEnvironmentName='$(BASE_NAME)-env-${{ parameters.environment }}'

                - task: AzureCLI@2
                  displayName: Print Identity API URL
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment group show \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --name optional-identity-api-helper-tool \
                        --query 'properties.outputs.identityApiUrl.value' -o tsv

  - stage: DeployApp
    displayName: Deploy Application
    dependsOn:
      - Push
      - PreviewInfra
      - DeployInfra
    condition: |
      and(
        eq(dependencies.Push.result, 'Succeeded'),
        in(dependencies.PreviewInfra.result, 'Succeeded', 'Skipped'),
        in(dependencies.DeployInfra.result, 'Succeeded', 'Skipped'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - deployment: DeployToAzure
        displayName: Deploy to Container Apps
        environment: $(deploymentEnvironmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - bash: |
                    DEPLOY_ID=$(curl -sf -X POST \
                      -H "Authorization: token $(GITHUB_TOKEN)" \
                      -H "Accept: application/vnd.github.v3+json" \
                      https://api.github.com/repos/fernandotonacoder/music-albums-api/deployments \
                      -d '{"ref":"'$(Build.SourceVersion)'","environment":"id-api-${{ parameters.environment }}","auto_merge":false,"required_contexts":[],"description":"Identity API ${{ parameters.environment }}"}' \
                      | jq -r '.id')
                    echo "##vso[task.setvariable variable=ghDeploymentId]$DEPLOY_ID"
                    echo "Created GitHub Deployment: $DEPLOY_ID"
                  displayName: Create GitHub Deployment

                - task: AzureCLI@2
                  displayName: Update Container App
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name '$(containerAppName)' \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --image '$(containerImage)'

                      APP_FQDN=$(az containerapp show \
                        --name '$(containerAppName)' \
                        --resource-group '$(RESOURCE_GROUP)' \
                        --query 'properties.configuration.ingress.fqdn' -o tsv)
                      echo "##vso[task.setvariable variable=appFqdn]$APP_FQDN"
                      echo "App URL: https://$APP_FQDN"

                - bash: |
                    if [ -z "$(ghDeploymentId)" ]; then
                      echo "No GitHub Deployment ID found. Skipping status update."
                      exit 0
                    fi

                    if [ "$(Agent.JobStatus)" = "Succeeded" ]; then
                      STATUS="success"
                    else
                      STATUS="failure"
                    fi

                    ENV_URL="https://$(appFqdn)"
                    LOG_URL="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"

                    curl -sf -X POST \
                      -H "Authorization: token $(GITHUB_TOKEN)" \
                      -H "Accept: application/vnd.github.v3+json" \
                      https://api.github.com/repos/fernandotonacoder/music-albums-api/deployments/$(ghDeploymentId)/statuses \
                      -d '{"state":"'"$STATUS"'","environment_url":"'"$ENV_URL"'","log_url":"'"$LOG_URL"'","auto_inactive":true}'
                    echo "GitHub Deployment status updated to $STATUS"
                  displayName: Update GitHub Deployment status
                  condition: always()

  - stage: DestroyInfra
    displayName: Destroy Infrastructure
    dependsOn: []
    condition: and(eq('${{ parameters.destroyInfra }}', 'true'), eq(variables['Build.Reason'], 'Manual'))
    jobs:
      - job: DestroyResources
        displayName: Delete Identity API Resources
        steps:
          - task: AzureCLI@2
            displayName: Delete Container App
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp delete \
                  --name '$(containerAppName)' \
                  --resource-group '$(RESOURCE_GROUP)' \
                  --yes || true
